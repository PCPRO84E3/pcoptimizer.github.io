<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Скачати програму</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(-45deg,#020024,#090979,#000,#3a0ca3);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.box{
    background: rgba(0,0,0,0.75);
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:360px;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
}

h1{
    margin-bottom:10px;
    font-size:22px;
}

p{
    opacity:0.8;
}

a.button{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:15px;
    padding:12px 18px;
    background:#3a0ca3;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s ease;
}

a.button:hover{
    background:#560bad;
    transform:scale(1.07);
}
</style>
</head>

<body>

<div class="box">
    <h1>🚀 Завантаж програму</h1>
    <p>Натисни кнопку нижче, щоб скачати файл</p>

    <a class="button" href="optimizer_pro.exe" download>
        ⬇ Завантажити EXE
    </a>

    <p style="font-size:12px; margin-top:10px; opacity:0.6;">
        Якщо файл не завантажується — перевір назву optimizer_pro.exe
    </p>
</div>

</body>
</html>
